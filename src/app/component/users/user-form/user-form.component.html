



<mat-card class="mt-3 mb-4">
    <mat-card-content>
        <h2 class="font-weight-bold text-center">{{isineditmode ? 'Update User' : 'Add User'}}</h2>
        <form [formGroup]="userform" (ngSubmit)="onsubmit()">
            <div class="form-group">
                <label for="userName">UserName*</label>
                <input 
                formControlName="userName"
                id="userName"
                class="form-control"
                type="text">
            </div>

            <div class="form-group">
                <label for="userRole">UserRole*</label>
                <select 
                formControlName="userRole"
                id="userRole"
                class="form-control"
                >
                <option value="Batsman">Batsman</option>
                <option value="Opening Batsman">Opening Batsman</option>
                <option value="Wicket Keeper">Wicket Keeper</option>
                <option value="Fast Bowler">Fast Bowler</option>
                <option value="All Rounder">All Rounder</option>
                <option value="Middle Order Batsman">Middle Order Batsman</option>
                
                </select>
            </div>

             <div class="form-group">
                <label for="profileDescription">Profile Description*</label>
                <textarea 
                formControlName="profileDescription"
                id="profileDescription"
                class="form-control"
                rows="4">
                
                </textarea>
            </div>

             <div class="form-group">
                <label for="profileImage">Profile Image*</label>
                <input 
                formControlName="profileImage"
                id="profileImage"
                type="text"
                class="form-control"
                >
            </div>

            <div class="form-group">
                <label for="experienceYears">Experience Is Years*</label>
                <select 
                formControlName="experienceYears"
                id="experienceYears"
                class="form-control"
                type="text">
                <option value="1 to 3 years">1 to 3 Years</option>
                <option value="3 to 5 years">3 to 5 Years</option>
                <option value="5 to 7 years">5 to 7 Years</option>
                <option value="7 to 10 years">7 to 10 Years</option>
                <option value="10+ years">10+ Years</option>
                <option value="15+ years">15+ Years</option>
                <option value="17+ years">17+ Years</option>
                <option value="20+ years">20+ Years</option>
                </select>
            </div>

            <div formArrayName="skills">
              <h4>Skills</h4>
              <div class="row" *ngFor="let skill of skillsArr.controls; let i = index">
                <div class="col-10">
                   <div class="form-group">
                     <input
                    [id]="'skill'+1"
                    [formControlName]="i"
                     type="text" class="form-control">
                   </div>
                </div>
                <div class="col-2">
                    <button
                    (click)="onskillremove(i)"
                     type="button" class="btn btn-sm btn-outline-danger">Remove</button>
                </div>

              </div>
              <div class="row">
                <div class="col-12">
                    <button
                    [disabled]="formcontrols['skills'].invalid"
                    (click)="addskillcontrol()"
                    class="mb-4"
                     type="button"
                     mat-raised-button
                     color="primary"
                     >Add Skills</button>
                </div>
              </div>
            </div>

            <div class="form-group">
                <label for="isActive">Is-Active*</label>
                <select 
                formControlName="isActive"
                id="isActive"
                class="form-control"
                type="text">
                <option [ngValue]="true">Active</option>
                <option [ngValue]="false">In-Active</option>
                </select>
            </div>

            <div formGroupName="address">
                <div class="row">
                    <div class="col-12">
                        <div class="row">
                            <div class="col-md-6">
                                <div formGroupName="current">
                                    <label class="font-weight-bold">Current Address</label>
                    <div class="form-group">
                        <label for="c-country">Country</label>
                        <input 
                        id="c-country"
                        formControlName="country"
                        class="form-control"
                        type="text">
                    </div>
                    <div class="form-group">
                        <label for="c-state">state</label>
                        <input 
                        id="c-state"
                        formControlName="state"
                        class="form-control"
                        type="text">
                    </div>
                     <div class="form-group">
                        <label for="c-city">city</label>
                        <input 
                        id="c-city"
                        formControlName="city"
                        class="form-control"
                        type="text">
                    </div>
                    <div class="form-group">
                        <label for="c-zipcode">zipcode</label>
                        <input 
                        id="c-zipcode"
                        formControlName="zipcode"
                        class="form-control"
                        type="text">    
                    </div>
                </div>
                            </div>
                            <div class="col-md-6">
                              <div formGroupName="permanent">
                                    <label class="font-weight-bold">Permanent Address</label>
                    <div class="form-group">
                        <label for="p-country">Country</label>
                        <input 
                        id="p-country"
                        formControlName="country"
                        class="form-control"
                        type="text">
                    </div>
                    <div class="form-group">
                        <label for="p-state">state</label>
                        <input 
                        id="p-state"
                        formControlName="state"
                        class="form-control"
                        type="text">
                    </div>
                     <div class="form-group">
                        <label for="p-city">city</label>
                        <input 
                        id="p-city"
                        formControlName="city"
                        class="form-control"
                        type="text">
                    </div>
                    <div class="form-group">
                        <label for="p-zipcode">zipcode</label>
                        <input 
                        id="p-zipcode"
                        formControlName="zipcode"
                        class="form-control"
                        type="text">    
                    </div>
                </div>
                            </div>
                           
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                 <div class="col-12">
                         <div class="form-group">
                             <label for="isAddSame">
                            <input type="checkbox" formControlName="isAddSame" id="isAddSame">
                            Current and Permanent Address are Same</label>
                        </div>
                 </div>
            </div>
            <button 
            *ngIf="!isineditmode"
            [disabled]="userform.invalid"
            mat-raised-button color="primary" class="w-100">Add User</button>
            <button 
            (click)="onupdateuser()"
            *ngIf="isineditmode"
            mat-raised-button color="warn" class="w-100">Update User</button>

        </form>
    </mat-card-content>
</mat-card>
